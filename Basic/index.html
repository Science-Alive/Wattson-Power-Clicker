<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Power Up! with Wattson</title>
    <link rel="icon" type="image/x-icon" href="assets/auto8.png" />

    <!-- Link stylesheet -->
    <link rel="stylesheet" href="style.css" />
    <!-- Recommended way to load JS to HTML is with defer attribute -->
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- LEFT COLUMN: The Game -->
    <div class="game-zone">
      <h2>POWER UP!</h2>

      <!-- Score Display -->
      <h1 id="score">0</h1>
      <p>Watts Generated</p>

      <!-- Stats -->
      <p>Watts per second: <span id="pps">0</span></p>

      <!-- The Main Clicker Button -->
      <button id="click-btn"></button>
    </div>

    <!-- RIGHT COLUMN: The Shop -->
    <div class="shop-zone">
      <h2>THE SHOP</h2>

      <button class="buy-btn" id="btn-auto1">
        <span class="count" id="count-auto1"></span>
        <span>⚡️ Static Charge (+1/sec)</span>
        <span class="cost-text" id="cost-auto1"></span>
      </button>

      <button class="buy-btn" id="btn-auto2">
        <span class="count" id="count-auto2"></span>
        <span>🥔 Potato Battery (+5/sec)</span>
        <span class="cost-text" id="cost-auto2"></span>
      </button>

      <button class="buy-btn" id="btn-auto3">
        <span class="count" id="count-auto3"></span>
        <span>🐹 Hamster Wheel (+10/sec)</span>
        <span class="cost-text" id="cost-auto3"></span>
      </button>

      <button class="buy-btn" id="btn-auto4">
        <span class="count" id="count-auto4"></span>
        <span>☀️ Solar Panel (+20/sec)</span>
        <span class="cost-text" id="cost-auto4"></span>
      </button>

      <button class="buy-btn" id="btn-auto5">
        <span class="count" id="count-auto5"></span>
        <span>☢️ Nuclear Plant (+50/sec)</span>
        <span class="cost-text" id="cost-auto5"></span>
      </button>

      <button class="buy-btn" id="btn-auto6">
        <span class="count" id="count-auto6"></span>
        <span>🌋 Volcano Plug (+100/sec)</span>
        <span class="cost-text" id="cost-auto6"></span>
      </button>

      <button class="buy-btn" id="btn-auto7">
        <span class="count" id="count-auto7"></span>
        <span>💫 Orbital Disco Ball Array (+250/sec)</span>
        <span class="cost-text" id="cost-auto7"></span>
      </button>

      <button class="buy-btn" id="btn-auto8">
        <span class="count" id="count-auto8"></span>
        <span>💥 Big Bang Dynamo (+1500/sec)</span>
        <span class="cost-text" id="cost-auto8"></span>
      </button>
    </div>
  </body>
</html>
